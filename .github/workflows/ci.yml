name: CI

on:
  push:
    branches: ["main", "feat/**"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Lint, generate data, and run RLS tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint (ruff)
        run: |
          pip install ruff --quiet
          ruff check . --select E,F,W --ignore E501

      - name: Generate dataset
        run: python src/data/gen_data.py

      - name: Initialise SQLite DB
        run: python -c "from src.data.db import init_db; init_db()"

      - name: Run RLS security tests
        run: python -m pytest tests/ -v --tb=short

      - name: Run data-layer evaluation (leakage check)
        run: python evals/eval.py

      - name: Run prompt-injection evaluation (tool-level, deterministic)
        run: python evals/injection_eval.py
